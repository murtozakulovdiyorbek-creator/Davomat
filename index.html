<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Davomat Tizimi</title>
</head>
<body>
    <header>
        <h1>Davomat Tizimi Application</h1>
    </header>
    <main>
        <!-- Login Screen -->
        <section id="login">
            <h2>Login</h2>
            <form>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username"><br>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password"><br>
                <button type="submit">Login</button>
            </form>
        </section>

        <!-- Super Admin Screen -->
        <section id="super-admin" style="display:none;">
            <h2>Super Admin Dashboard</h2>
            <p>Manage all applications and users.</p>
        </section>

        <!-- Admin Screen -->
        <section id="admin" style="display:none;">
            <h2>Admin Dashboard</h2>
            <p>Manage courses and students.</p>
        </section>

        <!-- Student Screen -->
        <section id="student" style="display:none;">
            <h2>Student Dashboard</h2>
            <p>View courses and grades.</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Davomat Tizimi. All rights reserved.</p>
    </footer>
</body>
</html>
