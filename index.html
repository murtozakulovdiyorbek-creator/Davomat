<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>
    <style>
        body { font-family: Arial, sans-serif; }
        /* Responsive design */
        @media (max-width: 600px) {
            body { background-color: lightblue; }
        }
    </style>
</head>
<body>
    <h1>Attendance System</h1>
    <!-- Login System -->
    <div id="login-panel">
        <h2>Login</h2>
        <form id="login-form">
            <label for="username">Username:</label>
            <input type="text" id="username"><br>
            <label for="password">Password:</label>
            <input type="password" id="password"><br>
            <button type="submit">Login</button>
        </form>
    </div>
    <div id="admin-panel" style="display: none;">
        <h2>Admin Panel</h2>
        <button id="logout">Logout</button>
        <div id="attendance-records"></div>
    </div>
    <div id="student-panel" style="display: none;">
        <h2>Student Panel</h2>
        <button id="logout">Logout</button>
        <div id="attendance-status"></div>
    </div>
    <script>
        function login(username, password) {
            // Simple login logic (replace with real authentication)
            localStorage.setItem('username', username);
            if (username === 'admin') {
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('login-panel').style.display = 'none';
            } else {
                document.getElementById('student-panel').style.display = 'block';
                document.getElementById('login-panel').style.display = 'none';
            }
        }
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            login(username, password);
        });
        document.querySelectorAll('#logout').forEach(function(button) {
            button.addEventListener('click', function() {
                localStorage.removeItem('username');
                document.getElementById('admin-panel').style.display = 'none';
                document.getElementById('student-panel').style.display = 'none';
                document.getElementById('login-panel').style.display = 'block';
            });
        });
    </script>
</body>
</html>
