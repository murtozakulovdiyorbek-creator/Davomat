<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance System</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>Attendance Management System</h1>
            <nav>
                <button id="superAdminBtn">Super Admin</button>
                <button id="adminBtn">Admin</button>
                <button id="studentBtn">Student</button>
            </nav>
        </header>
        <main>
            <section id="subject-management">
                <h2>Manage Subjects</h2>
                <h3>Add Subject</h3>
                <input type="text" id="subjectName" placeholder="Enter subject name" />
                <button id="addSubjectBtn">Add Subject</button>
                <ul id="subjectList"></ul>
            </section>
            <section id="attendance-tracking">
                <h2>Track Attendance</h2>
                <h3>Select Subject</h3>
                <select id="subjectSelect"></select>
                <h3>Mark Attendance</h3>
                <button id="markAttendanceBtn">Mark Attendance</button>
                <ul id="attendanceList"></ul>
            </section>
        </main>
        <footer>
            <p>Attendance System © 2026</p>
        </footer>
    </div>
</body>
</html>

<script>
// JavaScript code for attendance system
const attendanceSystem = (() => {
    let subjects = []; // Array to store subjects
    let attendanceRecords = []; // Array to store attendance records

    const init = () => {
        loadSubjects();
        loadAttendance();
        document.getElementById('addSubjectBtn')?.addEventListener('click', addSubject);
        document.getElementById('markAttendanceBtn')?.addEventListener('click', markAttendance);
    };

    const loadSubjects = () => {
        subjects = JSON.parse(localStorage.getItem('subjects')) || [];
        const subjectList = document.getElementById('subjectList');
        subjectList.innerHTML = subjects.map(subject => `<li>${subject}</li>`).join('');
        const subjectSelect = document.getElementById('subjectSelect');
        subjectSelect.innerHTML = subjects.map((subject, index) => `<option value='${index}'>${subject}</option>`).join('');
    };

    const loadAttendance = () => {
        attendanceRecords = JSON.parse(localStorage.getItem('attendanceRecords')) || [];
        const attendanceList = document.getElementById('attendanceList');
        attendanceList.innerHTML = attendanceRecords.map(record => `<li>${record.subject}: ${record.date}</li>`).join('');
    };

    const addSubject = () => {
        const subjectName = document.getElementById('subjectName').value;
        if (subjectName) {
            subjects.push(subjectName);
            localStorage.setItem('subjects', JSON.stringify(subjects));
            loadSubjects();
        }
    };

    const markAttendance = () => {
        const selectedSubjectIndex = document.getElementById('subjectSelect').value;
        const date = new Date().toISOString();
        attendanceRecords.push({ subject: subjects[selectedSubjectIndex], date });
        localStorage.setItem('attendanceRecords', JSON.stringify(attendanceRecords));
        loadAttendance();
    };

    return { init };
})();

// Initialize the attendance system upon loading
window.onload = attendanceSystem.init;
</script>
